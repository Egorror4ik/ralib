name: Build Android APK (Gradle)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Android NDK
      run: |
        echo "y" | sdkmanager "ndk;26.1.10909125"

    - name: Copy Android template
      run: |
        # Копируем Android-шаблон из raylib
        cp -r raylib/projects/Android/android .
        
        # Копируем ваш код в шаблон
        cp -r src/* android/app/src/main/cpp/
        
        # Копируем ресурсы (если есть)
        cp -r assets/* android/app/src/main/assets/ 2>/dev/null || true

    - name: Build APK with Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SecretClicker.apk
        path: android/app/build/outputs/apk/debug/*.apk
