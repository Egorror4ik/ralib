name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK and NDK
      run: |
        sudo apt-get update -y
        sudo apt-get install -y wget unzip
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        unzip commandlinetools-linux-*.zip -d android-sdk/cmdline-tools
        mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        echo "y" | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        echo "y" | sdkmanager --sdk_root=$ANDROID_HOME "ndk;26.1.10909125"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Build APK
      run: |
        mkdir build-android
        cd build-android
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-21 \
          -DANDROID_ABI=arm64-v8a \
          -DPLATFORM=Android \
          -DGRAPHICS=GRAPHICS_API_OPENGL_ES2
        cmake --build .
        # Используем встроенную команду package
        cmake --build . --target package

    - name: Find and rename APK
      run: |
        cd build-android
        # Ищем любой .apk файл
        find . -name "*.apk" -exec cp {} ./game.apk \;
        # Если не нашли, смотрим, что создалось
        if [ ! -f game.apk ]; then
          echo "APK не найден, показываем содержимое:"
          ls -la
          find . -type f
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SecretClicker.apk
        path: build-android/game.apk
