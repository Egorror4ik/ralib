name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK and NDK
      run: |
        sudo apt-get update -y
        sudo apt-get install -y wget unzip zip
        wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        mkdir -p android-sdk/cmdline-tools
        unzip commandlinetools-linux-*.zip -d android-sdk/cmdline-tools
        mv android-sdk/cmdline-tools/cmdline-tools android-sdk/cmdline-tools/latest
        export ANDROID_HOME=$PWD/android-sdk
        export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
        echo "y" | sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2"
        echo "y" | sdkmanager --sdk_root=$ANDROID_HOME "ndk;26.1.10909125"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

    - name: Build APK
      run: |
        # Создаём папку для сборки
        mkdir -p build-android
        cd build-android
        
        # Настраиваем и собираем проект
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_PLATFORM=android-21 \
          -DANDROID_ABI=arm64-v8a \
          -DPLATFORM=Android \
          -DGRAPHICS=GRAPHICS_API_OPENGL_ES2
        cmake --build .
        
        # Создаём структуру APK
        mkdir -p apk/lib/arm64-v8a
        cp raylib-game-template/raylib-game-template apk/lib/arm64-v8a/
        
        # Создаём AndroidManifest.xml (БЕЗ сжатия)
        cat > apk/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.egorror4ik.secretclicker"
            android:versionCode="1"
            android:versionName="1.0">
            <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="33"/>
            <application android:label="SecretClicker">
                <activity android:name="android.app.NativeActivity"
                    android:exported="true">
                    <meta-data android:name="android.app.lib_name"
                        android:value="raylib-game-template"/>
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # Упаковываем APK с zip (НЕ сжимаем AndroidManifest.xml)
        cd apk
        zip -r -0 ../game.apk AndroidManifest.xml
        zip -r ../game.apk lib/
        cd ..
        
        # Создаём отладочный ключ
        mkdir -p $ANDROID_HOME/.android
        if [ ! -f $ANDROID_HOME/.android/debug.keystore ]; then
          keytool -genkey -v -keystore $ANDROID_HOME/.android/debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US" -storepass android -keypass android
        fi
        
        # Подписываем APK с явным указанием minSdkVersion
        $ANDROID_HOME/build-tools/33.0.2/apksigner sign --min-sdk-version 21 --ks $ANDROID_HOME/.android/debug.keystore --ks-pass pass:android --key-pass pass:android game.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SecretClicker.apk
        path: build-android/game.apk
